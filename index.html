<!doctype html>
<html lang="en">
<head>
  <!-- Basic -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ijji labs — Digital Studio</title>

  <!-- Primary SEO -->
  <meta name="description" content="We design and build high-converting websites that turn traffic into revenue for your business." />
  <meta name="author" content="ijji labs" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://www.ijji-labs.com" />

  <!-- Theme -->
  <meta name="theme-color" content="#0f0f0f" />

  <!-- Open Graph -->
  <meta property="og:title" content="ijji labs — Digital Studio" />
  <meta property="og:description" content="We design and build high-converting websites that turn traffic into revenue for your business." />
  <meta property="og:image" content="https://www.ijji-labs.com/social-preview.png" />
  <meta property="og:url" content="https://www.ijji-labs.com" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="ijji labs" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="ijji labs — Digital Studio" />
  <meta name="twitter:description" content="We design and build high-converting websites that turn traffic into revenue for your business." />
  <meta name="twitter:image" content="https://www.ijji-labs.com/social-preview.png" />
  <!-- Optional: add if you have a handle -->
  <!-- <meta name="twitter:creator" content="@yourhandle" /> -->

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- Fonts (performance optimised) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Optional preload (helps performance slightly) -->
  <link
          rel="preload"
          as="style"
          href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Space+Grotesk:wght@300..700&display=swap"
  />

  <!-- Fonts -->
  <link
          href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Space+Grotesk:wght@300..700&display=swap"
          rel="stylesheet"
  />

  <!-- Web App / Mobile -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Structured Data -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ijji labs",
      "url": "https://www.ijji-labs.com",
      "logo": "https://www.ijji-labs.com/logo.png",
      "sameAs": [
        "https://www.linkedin.com/company/ijji-labs"
      ]
    }
  </script>
</head>

<body>
<!-- Root for React -->
<div id="root"></div>

<!-- Fallback for no JS -->
<noscript>
  <p>
    ijji labs — A digital studio creating high-converting websites.
    JavaScript is required to view this site properly.
  </p>
</noscript>

<!-- Main bundle -->
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
